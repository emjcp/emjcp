<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1f7a4c">
    <title>Clases de Canto</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: linear-gradient(180deg, #1f7a4c, #6bd17e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .wrapper {
            width: 360px;
            max-width: 90%;
            text-align: center;
        }
        
        .header {
            margin-bottom: 20px;
        }
        
        .logo {
            width: 90px;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        
        .title {
            color: white;
            font-size: 22px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #e7ffe9;
            font-size: 14px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 14px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        }
        
        .card a {
            text-decoration: none;
            font-weight: 600;
            color: #1f7a4c;
            font-size: 18px;
            display: block;
        }
        
        .card:hover {
            transform: scale(1.02);
            transition: 0.2s;
        }
        
        .footer {
            margin-top: 18px;
            font-size: 12px;
            color: white;
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <div class="header">
            <img src="logo.png" class="logo">
            <div class="title">Clases de Canto</div>
            <div class="subtitle">Escuela de Música · José C. Paz</div>
        </div>

        <div class="card">
            <a href="profesoradodecanto.html">
🎓 Profesorado de Canto
</a>
        </div>

        <div class="card">
            <a href="tallerdecanto.html">
🎤 Taller de Canto
</a>
        </div>

        <div class="footer">
            Escuela de Música José C. Paz
        </div>

    </div>

</body>

</html>
